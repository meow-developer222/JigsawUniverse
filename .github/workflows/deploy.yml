name: Jigsaw Project CI/CD

on:
  push:
    branches: [ "main" ] # 메인 브랜치 푸시 시 실행

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 1. 프론트엔드 빌드 및 푸시 (frontend 폴더)
      - name: Build and push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/jigsaw_frontend:latest

      # 2. 백엔드 빌드 및 푸시 (backend 폴더)
      - name: Build and push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/jigsaw_backend:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to CentOS via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: centos # CentOS 기본 사용자 이름
          key: ${{ secrets.SERVER_KEY }}
          script: |
            # 1. docker-compose 위치로 이동
            cd /home/centos/dispather-nginx
            
            # 2. 최신 이미지 가져오기
            docker-compose pull
            
            # 3. 컨테이너 재시작 (변경된 이미지만 반영됨)
            docker-compose up -d
            
            # 4. 불필요한 옛날 이미지 정리 (용량 관리)
            docker image prune -f