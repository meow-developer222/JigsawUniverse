name: Jigsaw Project CI/CD

on:
  push:
    branches: [ "main" ] # 메인 브랜치 푸시 시 실행

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 1. 프론트엔드 빌드 및 푸시 (frontend 폴더)
      - name: Build and push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/jigsaw_frontend:latest

      # 2. 백엔드 빌드 및 푸시 (backend 폴더)
      - name: Build and push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./server
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/jigsaw_server:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to CentOS via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: centos
          key: ${{ secrets.SERVER_KEY }}
          passphrase: ${{ secrets.KEY_PASSPHRASE }} # 이 부분이 추가되었습니다!
          script: |
            cd /home/centos/dispather-nginx
            
            # 1. 새로 만든 이미지들만 Docker Hub에서 가져옵니다. (placememo는 제외)
            docker-compose pull jigsaw_frontend jigsaw_server
            
            # 2. 변경된 이미지만 적용하여 컨테이너를 다시 띄웁니다.
            # (placememo는 로컬에 있으므로 그대로 유지되거나 로컬 것을 사용합니다.)
            docker-compose up -d jigsaw_frontend jigsaw_server nginx
            
            # 3. 필요하다면 전체를 다시 띄우되, pull 없이 실행합니다.
            # docker-compose up -d
            
            # 4. 정리
            docker image prune -f