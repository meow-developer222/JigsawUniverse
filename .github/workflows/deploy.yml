name: Jigsaw Project CI/CD

on:
  push:
    branches: [ "main" ] # 메인 브랜치 푸시 시 실행

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 1. 프론트엔드 빌드 및 푸시 (frontend 폴더)
      - name: Build and push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/jigsaw_frontend:latest

      # 2. 백엔드 빌드 및 푸시 (backend 폴더)
      - name: Build and push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./server
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/jigsaw_backend:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to CentOS via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: centos
          key: ${{ secrets.SERVER_KEY }}
          passphrase: ${{ secrets.KEY_PASSPHRASE }} # 이 부분이 추가되었습니다!
          script: |
            cd /home/centos/dispather-nginx
            docker-compose pull
            docker-compose up -d
            docker image prune -f