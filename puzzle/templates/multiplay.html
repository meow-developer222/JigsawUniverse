{% extends 'base.html' %}



{%block head%}
<style>
    body {
        overflow: hidden; /* 스크롤 기능 제거 */
        height: 100vh; /* 화면 높이 고정 */
        scrollbar-gutter: inherit; /* 스크롤바 숨김에 따른 레이아웃 흔들림 방지 */
    }
</style>

{%endblock%}


{% block content %}

<script src="https://t1.kakaocdn.net/kakao_js_sdk/2.7.0/kakao.min.js" crossorigin="anonymous"></script>
<script type="module" src="{{ url_for('static', filename='dist/network.js') }}"></script>
<script type="module" src="{{ url_for('static', filename='dist/share.js') }}"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js" integrity="sha512-q/dWJ3kcmjBLU4Qc47E4A9kTB4m3wuTY7vkFJDTZKjTs8jhyGQnaUrxa0Ytd0ssMZhbNua9hE+E7Qv1j+DyZwA==" crossorigin="anonymous"></script>

<div class="navbar">
    <div class="nav-icons">
        <a href="">
            <i class="fi fi-br-angle-left" style="font-size: 25px;"></i>
        </a>
        <button onclick="openNewDialog()">
            <i class="fi fi-rr-add-document" style="font-size: 25px;"></i>
        </button>  
        
        <button id="share-kakao">
            <i class="fi fi-sr-share" style="font-size: 25px;"></i>
        </button>  

        
    </div>
    
    
</div>

<div class="content-center h-100">
    <div>
        <canvas id="puzzle" width="520" height="700"></canvas>
    </div>

    

    
    <!-- <input type="text" id="nickname">
    <button id="startbtn" roomID="{{roomID}}">Test</button> -->
</div>

<div class="alert-back" id="nicknameDialog">
    <div class="alert">
        <div class="alert-title">닉네임 입력</div>
        <div style="height: 30px;"></div>
        <input type="text" name="" id="nicknameInput">
        <div style="height: 20px;"></div>
        <button type="button" id="nickname" class="alert-ok">입장</button>
    </div>
</div>

<div class="alert-back newpuzzle" id="newroom">
    
    <div class="alert">

        <div class="new-content">
            <div class="d-flex">
                <div class="alert-title">퍼즐 선택</div>
                <button type="button" onclick="closeNewDialog()">
                    <i class="fi fi-br-cross popup-close"></i>
                </button>
            </div>

            
            
        
            <div class="puzzle-selection">
                {%for puzzle in puzzles%}
                    <div class="puzzle-choice" onclick="selectPuzzle(this);">
                        <img src="{{puzzle['image']}}" alt="" width="100px" height="100px">
                        <input type="hidden" name="" value="{{puzzle['json']}}">
                    </div>
                    

                {%endfor%}
            </div>

            
        </div>
        <div>
            <div class="card-grey">
                <div class="warning d-flex align-center">
                    <i class="fi fi-rr-octagon-exclamation" style="font-size: 25px; margin-right: 5px;"></i>
                    <div>
                        새로운 퍼즐을 맞추기 시작하면 원래 퍼즐의 데이터는 사라집니다!
                    </div>
                    
                </div>
            </div>

            <div class="d-flex">
                <button type="button" id="new-cancel" class="alert-cancel" onclick="closeNewDialog()">취소</button>
                <div style="width: 20px;"></div>
                <button type="button" id="new-ok" class="alert-ok">생성</button>
                
            </div>
            
        </div>
        
    </div>

    <script type="module">

        import {startMulti} from "/static/dist/network.js"

        document.getElementById("new-ok").onclick = startMulti;
    </script>
</div>

{% endblock %}
